<svg width="1680" height="920" viewBox="0 0 1680 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>ZYArmV1 学习路线图</title>
  <desc>README 文档使用的工程风学习路线图。节点、颜色、连线均可在 SVG 中直接编辑。</desc>
  <defs>
    <style>
      :root {
        --ink: #172238;
        --muted: #718197;
        --line: #1d64f2;
        --cyan: #1396a3;
        --soft-line: #d7e2f1;
        --lane: #f2f6fa;
        --lane-alt: #eef8f9;
        --grid: #e7edf5;
        --warn: #f59e0b;
      }
      .title { font: 800 50px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; fill: var(--ink); }
      .subtitle { font: 500 22px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; fill: var(--muted); }
      .route-label { font: 800 24px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; fill: #0b55e8; }
      .lane-label { font: 800 24px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; fill: var(--ink); }
      .node-num { font: 800 26px "Inter", "DIN Alternate", "Microsoft YaHei", sans-serif; fill: currentColor; }
      .node-text { font: 600 20px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; fill: var(--ink); }
      .tiny { font: 700 16px "Inter", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif; fill: var(--warn); }
      .main { color: var(--line); }
      .accent { color: var(--cyan); }
      .thin-stroke { vector-effect: non-scaling-stroke; }
    </style>
    <pattern id="grid" width="68" height="68" patternUnits="userSpaceOnUse">
      <path d="M68 0H0V68" stroke="var(--grid)" stroke-width="1" opacity=".62"/>
    </pattern>
    <filter id="softShadow" x="-8%" y="-60%" width="116%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2563eb" flood-opacity=".06"/>
    </filter>
    <linearGradient id="fadeLane" x1="100" y1="0" x2="1580" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f3f7fb"/>
      <stop offset=".52" stop-color="#f8fbfd"/>
      <stop offset="1" stop-color="#f0f5fa"/>
    </linearGradient>
    <linearGradient id="fadeLaneCyan" x1="100" y1="0" x2="1580" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef9fa"/>
      <stop offset=".55" stop-color="#f7fcfc"/>
      <stop offset="1" stop-color="#eef7f8"/>
    </linearGradient>
  </defs>

  <rect width="1680" height="920" fill="#f8fafc"/>
  <rect width="1680" height="920" fill="url(#grid)" opacity=".9"/>

  <g id="corner-marks" stroke="#9bb5d8" stroke-width="1.4" opacity=".55" class="thin-stroke">
    <path d="M66 54V168M54 66H168"/>
    <circle cx="66" cy="66" r="7"/>
    <path d="M1614 54V168M1500 66H1626" stroke-dasharray="8 7"/>
    <path d="M66 752V866M54 854H168"/>
    <circle cx="66" cy="854" r="7"/>
    <path d="M1614 752V866M1500 854H1626" stroke-dasharray="8 7"/>
    <circle cx="1614" cy="854" r="7"/>
  </g>

  <g id="heading">
    <text class="title" x="106" y="130">学习路线图</text>
    <path d="M106 158H166" stroke="var(--line)" stroke-width="5" stroke-linecap="round"/>
    <text class="subtitle" x="106" y="194">先完成最小真机闭环，再按目标分支继续</text>
  </g>

  <g id="main-route" filter="url(#softShadow)">
    <path d="M364 329H453M657 329H748M952 329H1039M1244 329H1326" stroke="var(--line)" stroke-width="3" class="thin-stroke"/>
    <g fill="#f8fafc" stroke="var(--line)" stroke-width="3" class="thin-stroke">
      <circle cx="423" cy="329" r="6"/>
      <circle cx="721" cy="329" r="6"/>
      <circle cx="1012" cy="329" r="6"/>
      <circle cx="1300" cy="329" r="6"/>
    </g>

    <g id="main-label">
      <rect x="100" y="299" width="264" height="60" rx="30" fill="#f9fbff" stroke="var(--line)" stroke-width="2.2"/>
      <g transform="translate(133 309)" stroke="var(--line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="thin-stroke">
        <path d="M7 39H45"/>
        <path d="M16 39L25 20L38 32"/>
        <path d="M24 18L38 9L47 22L35 31"/>
        <path d="M11 19L25 8L38 9"/>
        <circle cx="25" cy="8" r="3"/>
        <circle cx="48" cy="22" r="3"/>
        <path d="M15 25L8 16L17 10"/>
      </g>
      <text class="route-label" x="186" y="337">最小真机闭环</text>
      <circle cx="240" cy="297" r="7" fill="var(--warn)"/>
      <text class="tiny" x="222" y="276">起点</text>
      <path d="M240 297V285" stroke="var(--warn)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g id="main-node-01" class="main">
      <rect x="453" y="301" width="204" height="56" rx="17" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
      <text class="node-num" x="490" y="338">01</text>
      <text class="node-text" x="540" y="337">产品简介</text>
    </g>
    <g id="main-node-02" class="main">
      <rect x="748" y="301" width="204" height="56" rx="17" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
      <text class="node-num" x="785" y="338">02</text>
      <text class="node-text" x="835" y="337">快速上手</text>
    </g>
    <g id="main-node-04" class="main">
      <rect x="1039" y="301" width="204" height="56" rx="17" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
      <text class="node-num" x="1076" y="338">04</text>
      <text class="node-text" x="1126" y="337">基础操作</text>
    </g>
    <g id="main-node-08" class="main">
      <rect x="1326" y="301" width="256" height="56" rx="17" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
      <text class="node-num" x="1364" y="338">08</text>
      <text class="node-text" x="1414" y="337">校准维护与排障</text>
    </g>
  </g>

  <g id="branch-spine" class="thin-stroke">
    <path d="M850 357V436" stroke="var(--line)" stroke-width="2.4"/>
    <circle cx="850" cy="436" r="7" fill="var(--line)"/>
    <path d="M850 436H421V765H530" stroke="var(--line)" stroke-width="1.6" stroke-dasharray="4 4" opacity=".82"/>
  </g>

  <g id="branch-lanes" filter="url(#softShadow)">
    <g id="lane-projects">
      <rect x="100" y="452" width="1480" height="82" rx="14" fill="url(#fadeLaneCyan)" opacity=".95"/>
      <g transform="translate(130 481)" stroke="var(--cyan)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="thin-stroke">
        <rect x="0" y="0" width="12" height="12" rx="2"/>
        <rect x="22" y="0" width="12" height="12" rx="2"/>
        <rect x="0" y="22" width="12" height="12" rx="2"/>
        <path d="M22 28h12M28 22v12"/>
      </g>
      <text class="lane-label" x="189" y="505">继续做项目</text>
      <path d="M370 493H530" stroke="var(--cyan)" stroke-width="1.7" opacity=".8" class="thin-stroke"/>
      <path d="M370 477V510" stroke="#d5e3ef" stroke-width="1.2"/>
      <circle cx="508" cy="493" r="5" fill="#f8fafc" stroke="var(--cyan)" stroke-width="2"/>
      <g class="accent">
        <rect x="530" y="473" width="290" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="572" y="503">05</text>
        <text class="node-text" x="618" y="502">常用玩法与项目案例</text>
      </g>
    </g>

    <g id="lane-framework">
      <rect x="100" y="542" width="1480" height="82" rx="14" fill="url(#fadeLane)" opacity=".95"/>
      <g transform="translate(128 571)" stroke="var(--line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="thin-stroke">
        <path d="M17 1L5 17L17 33"/>
        <path d="M38 1L50 17L38 33"/>
        <path d="M31 0L23 34"/>
      </g>
      <text class="lane-label" x="189" y="595">接入软件框架</text>
      <path d="M370 583H530M800 583H1255" stroke="var(--line)" stroke-width="1.7" opacity=".68" class="thin-stroke"/>
      <path d="M370 567V600" stroke="#d5e3ef" stroke-width="1.2"/>
      <circle cx="508" cy="583" r="5" fill="#f8fafc" stroke="var(--line)" stroke-width="2"/>
      <circle cx="1233" cy="583" r="5" fill="#f8fafc" stroke="var(--line)" stroke-width="2"/>
      <g class="main">
        <rect x="530" y="563" width="270" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="583" y="593">03</text>
        <text class="node-text" x="628" y="592">安装与准备</text>
        <rect x="1255" y="563" width="270" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="1307" y="593">06</text>
        <text class="node-text" x="1353" y="592">仿真与框架接入</text>
      </g>
    </g>

    <g id="lane-research">
      <rect x="100" y="632" width="1480" height="82" rx="14" fill="url(#fadeLaneCyan)" opacity=".95"/>
      <g transform="translate(130 660)" stroke="var(--cyan)" stroke-width="2.4" stroke-linecap="round" class="thin-stroke">
        <path d="M3 34V18"/>
        <path d="M18 34V2"/>
        <path d="M33 34V11"/>
        <path d="M48 34V24"/>
      </g>
      <text class="lane-label" x="189" y="685">做科研数据采集</text>
      <path d="M370 673H530M800 673H895" stroke="var(--cyan)" stroke-width="1.7" opacity=".8" class="thin-stroke"/>
      <path d="M370 657V690" stroke="#d5e3ef" stroke-width="1.2"/>
      <circle cx="508" cy="673" r="5" fill="#f8fafc" stroke="var(--cyan)" stroke-width="2"/>
      <circle cx="873" cy="673" r="5" fill="#f8fafc" stroke="var(--cyan)" stroke-width="2"/>
      <g class="accent">
        <rect x="530" y="653" width="270" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="583" y="683">03</text>
        <text class="node-text" x="628" y="682">安装与准备</text>
        <rect x="895" y="653" width="264" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="937" y="683">07</text>
        <text class="node-text" x="984" y="682">科研与数据采集</text>
      </g>
    </g>

    <g id="lane-developer">
      <rect x="100" y="722" width="1480" height="82" rx="14" fill="url(#fadeLane)" opacity=".95"/>
      <g transform="translate(128 751)" stroke="#6f8bc3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="thin-stroke">
        <path d="M17 1L5 17L17 33"/>
        <path d="M38 1L50 17L38 33"/>
        <path d="M31 0L23 34"/>
      </g>
      <text class="lane-label" x="189" y="775">参与二次开发</text>
      <path d="M370 763H530M800 763H1255" stroke="var(--line)" stroke-width="1.7" opacity=".68" class="thin-stroke"/>
      <path d="M370 747V780" stroke="#d5e3ef" stroke-width="1.2"/>
      <circle cx="508" cy="763" r="5" fill="#f8fafc" stroke="var(--line)" stroke-width="2"/>
      <circle cx="1233" cy="763" r="5" fill="#f8fafc" stroke="var(--line)" stroke-width="2"/>
      <g class="main">
        <rect x="530" y="743" width="270" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="583" y="773">03</text>
        <text class="node-text" x="628" y="772">安装与准备</text>
        <rect x="1255" y="743" width="270" height="42" rx="14" fill="#ffffff" stroke="currentColor" stroke-width="1.2"/>
        <text class="node-num" x="1307" y="773">09</text>
        <text class="node-text" x="1353" y="772">开发者指南</text>
      </g>
    </g>
  </g>
</svg>
